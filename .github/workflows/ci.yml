# =============================================================================
# PlumbTix — CI/CD Pipeline
# =============================================================================
# On PR: lint, typecheck, test, build (+ e2e)
# On merge to main: lint, typecheck, test, build
# Production deploys are handled by Netlify's git integration (frontend)
# and deploy-functions.yml (Supabase edge functions) — NOT by this workflow.
# =============================================================================

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ shared/

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_EDGE_BASE_URL: https://placeholder.supabase.co/functions/v1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_EDGE_BASE_URL: ${{ secrets.EDGE_BASE_URL }}